syntax = "proto3";

message GuildMetric {
  int64 guild_id = 1;
}

message CommandMetric {
  int64  guild_id = 1;
  string command  = 2;
}

message GuildCountMetric {
  int32 count = 1;
}

message BlockingActiveMetric {
  bool is_active = 1;
}

message BlockingDurationMetric {
  double time = 1;
}

message BlockingEventMetric {
  string event = 1;
  string cause = 2;
}

message BlockingSecondsMetric {
  double seconds = 1;
}

message BlockingCheckMetric {
  double check_timestamp   = 1;
  bool   was_blocked       = 2;
  double threshold_seconds = 3;
}

message LoopLatencyMetric {
  double latency_seconds = 1;
}

message MonitorStatusMetric {
  string status      = 1;
  string thread_name = 2;
}
