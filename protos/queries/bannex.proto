syntax = "proto3";

enum LayerType {
  LAYER_TEXT      = 0;
  LAYER_IMAGE     = 1;
  LAYER_RECTANGLE = 2;
  LAYER_CIRCLE    = 3;
}

enum HorizontalAlignment {
  H_LEFT   = 0;
  H_CENTER = 1;
  H_RIGHT  = 2;
}

enum VerticalAlignment {
  V_TOP    = 0;
  V_CENTER = 1;
  V_BOTTOM = 2;
}

message LayerStroke {
  uint32 width = 1;
  string color = 2;
}

message LayerTypography {
  string              font_family          = 1;
  string              font_weight          = 2;
  float               font_size            = 3;
  float               line_height          = 4;
  float               letter_spacing       = 5;
  HorizontalAlignment horizontal_alignment = 6;
  VerticalAlignment   vertical_alignment   = 7;
}

message LayerDef {
  LayerType       type          = 1;
  repeated int32  position      = 2;
  repeated uint32 dimensions    = 3;
  float           rotation      = 4;
  string          fill          = 5;
  LayerStroke     stroke        = 6;
  repeated uint32 border_radius = 7;
  LayerTypography typography    = 8;
  string          value         = 9;
  bool            inverted_x    = 10;
  bool            inverted_y    = 11;
  float           opacity       = 12;
}

message CanvasDef {
  repeated uint32 dimensions = 1;
  string          fill       = 2;
  LayerStroke     stroke     = 3;
}

message ImageGenerateRequest {
  CanvasDef         canvas = 1;
  repeated LayerDef layers = 2;
  bytes             avatar = 3;
  string            name   = 4;
}

message BannerResponse {
  string redis_key    = 1;
  string content_type = 2;
}
