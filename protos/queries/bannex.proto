syntax = "proto3";

enum BannexFonts {
  DEFAULT        = 0;
  KAUSHAN_SCRIPT = 1;
  LOBSTER        = 2;
  MERRI_WEATHER  = 3;
  OPEN_SANS      = 4;
  OSWALD         = 5;
  PACIFICO       = 6;
  PLAYFAIR       = 7;
  ROBOTO         = 8;
}

enum Alignment {
  LEFT   = 0;
  CENTER = 1;
  RIGHT  = 2;
}

enum AvatarShape {
  CIRCLE = 0;
  SQUARE = 1;
}

message BannerConfig {
  bool        banner_enabled        = 1;
  string      banner_url            = 2;
  string      banner_solid_colour   = 3;
  bool        banner_border_enabled = 4;
  string      banner_border_colour  = 5;
  int64       banner_border_width   = 6;
  bool        text_enabled          = 7;
  string      text_message          = 8;
  string      text_message_colour   = 9;
  BannexFonts text_message_font     = 10;
  BannexFonts text_name_font        = 11;
  bool        text_border_enabled   = 12;
  string      text_border_colour    = 13;
  int64       text_border_width     = 14;
  bool        avatar_enabled        = 15;
  AvatarShape avatar_shape          = 16;
  bool        avatar_border_enabled = 17;
  string      avatar_border_colour  = 18;
  int64       avatar_border_width   = 19;
}

message BannerRequest {
  BannerConfig config = 1;
  bytes        avatar = 2;
  string       name   = 3;
}

message BannerResponse {
  string redis_key    = 1;
  string content_type = 2;
}

message BannexFontsResponse {
  repeated string fonts = 1;
}
