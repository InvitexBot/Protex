syntax = "proto3";

message GuildRequest {
  int64 guild_id = 1;
}

message GuildInfoResponse {
  string          id       = 1;
  string          name     = 2;
  optional string icon_url = 3;
}

// --- Welcome Config (nested) ---

message Border {
  bool   enabled = 1;
  string colour  = 2;
  int32  width   = 3;
}

message BannerSettings {
  bool            enabled      = 1;
  optional string url          = 2;
  string          solid_colour = 3;
  Border          border       = 4;
}

message TextSettings {
  bool   enabled        = 1;
  string message        = 2;
  string message_colour = 3;
  string message_font   = 4;
  string name_font      = 5;
  Border border         = 6;
}

message AvatarSettings {
  bool   enabled = 1;
  string shape   = 2;
  Border border  = 3;
}

message WelcomeConfigResponse {
  optional string channel_id = 1;
  BannerSettings  banner     = 2;
  TextSettings    text       = 3;
  AvatarSettings  avatar     = 4;
}

// --- Guild Config ---

message GuildConfigResponse {
  string                         guild_id    = 1;
  bool                           ignore_bots = 2;
  optional WelcomeConfigResponse welcome     = 3;
}

// --- Channels ---

message CategoryInfo {
  string name     = 1;
  int32  position = 2;
}

message ChannelInfo {
  string          name     = 1;
  string          id       = 2;
  optional string category = 3;
  int32           position = 4;
  optional string type     = 5;
}

message GuildChannelsResponse {
  repeated CategoryInfo categories = 1;
  repeated ChannelInfo  channels   = 2;
}

// --- Command History ---

message CommandUsageEntry {
  string command_name  = 1;
  int32  usage_count   = 2;
  string last_executed = 3;
}

message CommandHistoryResponse {
  string                     guild_id = 1;
  repeated CommandUsageEntry commands = 2;
}
