syntax = "proto3";

message GuildRequest {
  int64 guild_id = 1;
}

message GuildInfoResponse {
  string          id       = 1;
  string          name     = 2;
  optional string icon_url = 3;
}

message WelcomeMessageResponse {
  optional string content                 = 1;
  bool            embed_enabled           = 2;
  optional string embed_title             = 3;
  optional string embed_description       = 4;
  optional string embed_url               = 5;
  optional string embed_colour            = 6;
  optional string embed_image_url         = 7;
  optional string embed_thumbnail_url     = 8;
  optional string embed_author_name       = 9;
  optional string embed_author_url        = 10;
  optional string embed_author_icon_url   = 11;
  optional string embed_footer_text       = 12;
  optional string embed_footer_icon_url   = 13;
  bool            embed_timestamp_enabled = 14;
  optional string embed_fields            = 15;
}

message WelcomeConfigResponse {
  optional string                 channel_id     = 1;
  bool                            banner_enabled = 2;
  string                          canvas_config  = 3;
  optional WelcomeMessageResponse message        = 4;
}

message GuildConfigResponse {
  string                         guild_id    = 1;
  bool                           ignore_bots = 2;
  optional WelcomeConfigResponse welcome     = 3;
}

message CategoryInfo {
  string name     = 1;
  int32  position = 2;
}

message ChannelInfo {
  string          name     = 1;
  string          id       = 2;
  optional string category = 3;
  int32           position = 4;
  optional string type     = 5;
}

message GuildChannelsResponse {
  repeated CategoryInfo categories = 1;
  repeated ChannelInfo  channels   = 2;
}

message CommandUsageEntry {
  string command_name  = 1;
  int32  usage_count   = 2;
  string last_executed = 3;
}

message CommandHistoryResponse {
  string                     guild_id = 1;
  repeated CommandUsageEntry commands = 2;
}
