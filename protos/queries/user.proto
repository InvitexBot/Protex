syntax = "proto3";

message UserRequest {
  int64 user_id = 1;
}

message UserInfoResponse {
  string          id            = 1;
  string          name          = 2;
  optional string display_name  = 3;
  string          discriminator = 4;
  optional string avatar        = 5;
  string          created_at    = 6;
}


message MutualGuildsRequest {
  int64          user_id     = 1;
  repeated int64 user_guilds = 2;
}

message MutualGuildsResponse {
  repeated int64 mutual_guilds = 1;
}
